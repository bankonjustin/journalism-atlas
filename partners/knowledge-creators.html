<!DOCTYPE html>
<html lang="en">
<head>

<title>Knowledge Creators Picks — Independent Journalism Atlas</title>
<meta name="description" content="17 edu-journalism creators tracked by Knowledge Creators — blending journalism and education across YouTube, podcasts, and newsletters on tech, health, business, and science.">
<meta property="og:title" content="Knowledge Creators Picks — Independent Journalism Atlas">
<meta property="og:description" content="17 edu-journalism creators tracked by Knowledge Creators — blending journalism and education across YouTube, podcasts, and newsletters on tech, health, business, and science.">

<style>
@import url('https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;700&display=swap');

:root {
  --acid:    #ceff00;
  --lime:    #97d600;
  --olive:   #5d7400;
  --page-bg: #efeff2;
  --border:  #d4d4d8;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }
body { font-family: 'Hanken Grotesk', sans-serif; background: var(--page-bg); color: #313131; line-height: 1.5; overflow-x: hidden; }
a { color: inherit; text-decoration: none; }
img { max-width: 100%; display: block; }

.container { width: 100%; max-width: 1040px; margin: 0 auto; padding: 0 40px; }

.site-nav { position: sticky; top: 0; z-index: 100; background: #fff; border-bottom: 0.5px solid var(--border); }
.site-nav-inner { max-width: 1040px; margin: 0 auto; padding: 0 40px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
.site-nav-logo img { height: 26px; width: auto; }
.site-nav-link { font-size: 13px; font-weight: 500; color: #313131; letter-spacing: 0.04em; transition: color 0.15s; }
.site-nav-link:hover { color: #000; text-decoration: underline; }
.site-nav-link:focus-visible { outline: 2px solid var(--lime); outline-offset: 2px; }

.hero { background: #000; padding: 88px 0 72px; }
.hero-grid { display: flex; flex-direction: column; gap: 32px; }

.hero-eyebrow { font-size: 12px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--acid); margin-bottom: 20px; }
.hero-h1 { font-size: 44px; font-weight: 700; line-height: 52px; letter-spacing: -0.5px; color: #fff; margin-bottom: 20px; }
.hero-body { font-size: 17px; font-weight: 400; line-height: 28px; color: rgba(255,255,255,0.72); max-width: 600px; margin-bottom: 32px; }

.hero-stats {
  display: flex;
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 6px;
  overflow: hidden;
  max-width: 640px;
  margin-bottom: 24px;
}
.hero-stat { flex: 1; padding: 20px 24px; border-right: 1px solid rgba(255,255,255,0.15); }
.hero-stat:last-child { border-right: none; }
.hero-stat-num { font-size: 36px; font-weight: 700; line-height: 1; color: var(--acid); margin-bottom: 6px; }
.hero-stat-label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.45); }

.hero-collab { font-size: 13px; font-weight: 500; letter-spacing: 0.05em; color: rgba(255,255,255,0.4); }

.partner-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.08); border-radius: 6px; padding: 32px; }
.partner-card-logo { margin-bottom: 16px; }
.partner-card-logo img { height: 40px; width: auto; }
.partner-name { font-size: 22px; font-weight: 700; color: #000; line-height: 1.25; margin-bottom: 8px; }
.partner-role { font-size: 14px; font-weight: 400; color: #888; line-height: 1.55; margin-bottom: 12px; }
.partner-url { font-size: 14px; font-weight: 500; color: var(--olive); transition: color 0.15s; }
.partner-url:hover { color: #000; }

.grid-section { background: var(--page-bg); padding: 64px 0; }
.grid-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 32px; }
.grid-h2 { font-size: 28px; font-weight: 700; color: #000; letter-spacing: -0.25px; }
.grid-context { font-size: 13px; font-weight: 500; color: #888; letter-spacing: 0.04em; }

.creator-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }

.creator-card {
  background: #fff;
  border: 0.5px solid var(--border);
  border-radius: 6px;
  padding: 24px;
  display: flex;
  flex-direction: column;
  transition: border-color 0.15s;
}
.creator-card:hover { border-color: var(--lime); }
.creator-name { font-size: 18px; font-weight: 700; color: #000; line-height: 1.3; margin-bottom: 4px; }
.creator-channel { font-size: 14px; font-weight: 500; color: var(--olive); margin-bottom: 12px; }
.card-blurb { font-size: 14px; font-weight: 400; color: #606068; line-height: 22px; margin-bottom: 16px; }
.creator-pills { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 12px; border-radius: 100px;
  font-size: 12px; font-weight: 500;
  background: #efeff2; border: 0.5px solid var(--border); color: #313131;
}
.pill.platform { background: var(--lime); border-color: var(--olive); }
.pill .material-symbols-outlined {
  font-size: 14px; line-height: 1;
  font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 14;
}
.card-divider { border: none; border-top: 0.5px solid var(--border); margin-bottom: 16px; }
.card-link {
  font-size: 14px; font-weight: 500; color: var(--olive);
  margin-top: auto;
  display: inline-flex; align-items: center;
  padding: 6px 12px; border-radius: 6px; margin-left: -12px;
  transition: color 0.15s, background 0.15s;
}
.card-link:hover { color: #313131; background: var(--lime); }
.card-link:focus-visible { outline: 2px solid var(--lime); outline-offset: 2px; }

.about-rule { border: none; border-top: 1px solid var(--border); margin: 0; }
.about-section { background: #fff; padding: 80px 0; }
.about-inner { max-width: 640px; }
.about-logo { margin-bottom: 24px; }
.about-logo img { height: 44px; width: auto; }
.about-text-name { font-size: 28px; font-weight: 700; color: #000; letter-spacing: -0.25px; margin-bottom: 24px; line-height: 1.2; }
.about-headline { font-size: 28px; font-weight: 700; color: #000; letter-spacing: -0.25px; margin-bottom: 16px; }
.about-body { font-size: 16px; font-weight: 400; line-height: 26px; color: #444; margin-bottom: 20px; }
.about-link { font-size: 14px; font-weight: 500; color: var(--olive); transition: color 0.15s; }
.about-link:hover { color: #000; }

.atlas-footer { background: #313131; padding: 80px 0; }
.atlas-footer-inner { display: flex; flex-direction: column; align-items: flex-start; gap: 20px; }
.atlas-footer-logo img { height: 20px; width: auto; }
.atlas-footer-tagline { font-size: 16px; font-weight: 400; line-height: 26px; color: rgba(255,255,255,0.65); max-width: 480px; }
.atlas-footer-btn {
  display: inline-flex; align-items: center;
  padding: 12px 24px;
  background: var(--acid); color: #000;
  font-family: 'Hanken Grotesk', sans-serif;
  font-size: 14px; font-weight: 700; border-radius: 6px;
  transition: opacity 0.15s; margin-top: 4px;
}
.atlas-footer-btn:hover { opacity: 0.88; }
.atlas-footer-btn:focus-visible { outline: 2px solid var(--lime); outline-offset: 2px; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: var(--page-bg); }
::-webkit-scrollbar-thumb { background: var(--border); }

@media (min-width: 1024px) {
  .hero-grid { display: grid; grid-template-columns: 55fr 45fr; gap: 48px; align-items: start; }
}

@media (max-width: 768px) {
  .hero { padding: 56px 0 48px; }
  .hero-h1 { font-size: 32px; line-height: 40px; }
  .hero-body { font-size: 16px; }
}

@media (max-width: 480px) {
  .container { padding: 0 20px; }
  .site-nav-inner { padding: 0 20px; }
  .hero { padding: 48px 0 40px; }
  .hero-h1 { font-size: 26px; line-height: 34px; }
  .hero-body { font-size: 16px; line-height: 26px; }
  .hero-stat { padding: 16px 18px; }
  .hero-stat-num { font-size: 28px; }
  .grid-section { padding: 48px 0; }
  .about-section { padding: 56px 0; }
  .atlas-footer { padding: 56px 0; }
}
</style>
    <link rel="stylesheet" href="/assets/css/header.css">
</head>
<body>
    <script src="/assets/js/header.js"></script>


<nav class="site-nav">
  <div class="site-nav-inner">
    <a href="https://journalismatlas.com" class="site-nav-logo">
      <img src="../assets/images/logos/Journalism_Atlas_wordmark_lockup_black.png" alt="Independent Journalism Atlas">
    </a>
    <a href="https://journalismatlas.com" class="site-nav-link">Explore the Atlas &rarr;</a>
  </div>
</nav>

<section class="hero">
  <div class="container">
    <div class="hero-grid">
      <div class="hero-left" id="hero-left"></div>
      <div class="hero-right" id="hero-right"></div>
    </div>
  </div>
</section>

<section class="grid-section">
  <div class="container">
    <div class="grid-header">
      <h2 class="grid-h2" id="grid-heading"></h2>
      <span class="grid-context" id="grid-context"></span>
    </div>
    <div class="creator-grid" id="creator-grid"></div>
  </div>
</section>

<div class="about-rule"></div>
<section class="about-section">
  <div class="container">
    <div class="about-inner" id="about-inner"></div>
  </div>
</section>

<footer class="atlas-footer">
  <div class="container">
    <div class="atlas-footer-inner">
      <div class="atlas-footer-logo">
        <img src="../assets/images/logos/Journalism_Atlas_wordmark_horizontal_lockup_white.png" alt="Independent Journalism Atlas">
      </div>
      <p class="atlas-footer-tagline">Discover 1,200+ independent creator-journalists across newsletters, video, podcasts, and social.</p>
      <a href="https://journalismatlas.com" class="atlas-footer-btn">Explore the Atlas &rarr;</a>
    </div>
  </div>
</footer>

<script>
const PARTNER_CONFIG = {
  curatorName: 'Knowledge Creators',
  curatorChannel: 'Knowledge-creators.com',
  curatorUrl: 'https://knowledge-creators.com',
  curatorNote: 'Knowledge-creators.com tracks the expanding universe of creators whose work blurs the line between journalism and education — building durable, authoritative audiences across YouTube, podcasts, and newsletters.',
  pageTitle: 'Knowledge Creators Picks — Independent Journalism Atlas',
  pageDescription: '17 edu-journalism creators tracked by Knowledge Creators — blending journalism and education across YouTube, podcasts, and newsletters on tech, health, business, and science.',
  logoWhite: null,
  logoColor: null,
  stats: [
    { num: '17',          label: 'Creators' },
    { num: '6',           label: 'Topics' },
    { num: '3',           label: 'Platforms' },
    { num: 'Edu-journalism', label: 'Focus' },
  ],
  aboutHeadline: 'About Knowledge Creators',
  aboutParagraphs: [
    'Knowledge-creators.com tracks the expanding universe of creator-journalists who blur the line between journalism and education. These are the builders of durable, authoritative audiences — people who inform, teach, and report simultaneously — working across YouTube, podcasts, and newsletters on topics from health and science to personal finance and tech.',
    'This curated list is part of an ongoing collaboration between Knowledge Creators and the Independent Journalism Atlas. Together, we are working to map and celebrate the edu-journalism ecosystem — making it easier for audiences to find creators who go deep.',
  ],
  aboutLinkText: 'Visit Knowledge Creators',
  aboutLinkUrl: 'https://knowledge-creators.com',
  creators: [
    { name: 'Codie Sanchez', channel: 'Contrarian Thinking', link: 'https://www.youtube.com/@CodieSanchez', platform: 'Video - YouTube', topic: 'Business' },
    { name: 'Dr. Jennifer Ashton', channel: 'Dr. Jennifer Ashton', link: 'https://www.youtube.com/@DrJenniferAshton', platform: 'Video - YouTube', topic: 'Health/Wellness' },
    { name: 'Dr. Joel Bervell', channel: 'Dr. Joel Bervell', link: 'https://www.instagram.com/joelbervell', platform: 'Video - Instagram', topic: 'Health/Wellness' },
    { name: 'Dr. Shade Zahrai', channel: 'Dr. Shade Zahrai', link: 'https://www.youtube.com/@ShadZahrai', platform: 'Video - YouTube', topic: 'Health/Wellness' },
    { name: 'Emma Grede', channel: 'Emma Grede', link: 'https://www.youtube.com/@EmmaGrede', platform: 'Video - YouTube', topic: 'Business' },
    { name: 'Hank Green', channel: 'SciShow / vlogbrothers', link: 'https://www.youtube.com/@hankgreen1', platform: 'Video - YouTube', topic: 'Science' },
    { name: 'Jefferson Fisher', channel: 'Jefferson Fisher', link: 'https://www.youtube.com/@JeffersonFisher', platform: 'Video - YouTube', topic: 'Explanatory' },
    { name: 'Kris McDaniel', channel: 'Kris McDaniel', link: 'https://www.youtube.com/@KrisMcDaniel', platform: 'Video - YouTube', topic: 'Business' },
    { name: 'Maggie Sellers Reum', channel: 'Maggie Sellers Reum', link: 'https://www.instagram.com/maggiesellersreum', platform: 'Video - Instagram', topic: 'Business' },
    { name: 'Marina Mogilko', channel: 'Silicon Valley Girl', link: 'https://www.youtube.com/@SiliconValleyGirl', platform: 'Video - YouTube', topic: 'Tech' },
    { name: 'Mychal Threets', channel: 'Mychal Threets', link: 'https://www.instagram.com/mychalthreets', platform: 'Video - Instagram', topic: 'Explanatory' },
    { name: 'Rowan Cheung', channel: 'The Rundown AI', link: 'https://www.therundown.ai', platform: 'Website', topic: 'Tech' },
    { name: 'Simone Giertz', channel: 'Simone Giertz', link: 'https://www.youtube.com/@simonegiertz', platform: 'Video - YouTube', topic: 'Science' },
    { name: 'Steven Bartlett', channel: 'Diary of a CEO', link: 'https://www.youtube.com/@TheDiaryOfACEO', platform: 'Podcast', topic: 'Business' },
    { name: 'Tiffany Aliche', channel: 'The Budgetnista', link: 'https://www.youtube.com/@TheBudgetnista', platform: 'Video - YouTube', topic: 'Personal Finance' },
    { name: 'Tommy Geoco', channel: 'Tommy Geoco', link: 'https://www.youtube.com/@tommygeoco', platform: 'Video - YouTube', topic: 'Explanatory' },
    { name: 'Catherine Goetze', channel: 'Catherine Goetze', link: 'https://www.youtube.com/@catherinegoetze', platform: 'Video - YouTube', topic: 'Science' },
  ],
};

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function getPlatformInfo(platform) {
  const map = {
    'Newsletter - Substack': { icon: 'mail',             name: 'Substack'    },
    'Newsletter - Beehiiv':  { icon: 'mail',             name: 'Beehiiv'     },
    'Newsletter - Ghost':    { icon: 'mail',             name: 'Ghost'       },
    'Newsletter - Other':    { icon: 'mail',             name: 'Newsletter'  },
    'Video - YouTube':       { icon: 'play_circle',      name: 'YouTube'     },
    'Video - Instagram':     { icon: 'play_circle',      name: 'Instagram'   },
    'Video - TikTok':        { icon: 'play_circle',      name: 'TikTok'      },
    'Podcast':               { icon: 'podcasts',         name: 'Podcast'     },
    'Website':               { icon: 'language',         name: 'Website'     },
  };
  if (map[platform]) return map[platform];
  if (platform && platform.startsWith('Social')) {
    return { icon: 'alternate_email', name: platform.replace('Social - ', '') };
  }
  return { icon: 'language', name: platform || '' };
}

function renderHeroLeft() {
  const statsHTML = PARTNER_CONFIG.stats.map(s => `
    <div class="hero-stat">
      <div class="hero-stat-num">${esc(s.num)}</div>
      <div class="hero-stat-label">${esc(s.label)}</div>
    </div>
  `).join('');

  document.getElementById('hero-left').innerHTML = `
    <p class="hero-eyebrow">A Curated List from ${esc(PARTNER_CONFIG.curatorName)}</p>
    <h1 class="hero-h1">${esc(PARTNER_CONFIG.pageTitle.replace(' — Independent Journalism Atlas', ''))}</h1>
    <p class="hero-body">${esc(PARTNER_CONFIG.curatorNote)}</p>
    <div class="hero-stats">${statsHTML}</div>
    <p class="hero-collab">Curated by ${esc(PARTNER_CONFIG.curatorName)} &times; Independent Journalism Atlas</p>
  `;
}

function renderHeroRight() {
  const logoHTML = PARTNER_CONFIG.logoWhite
    ? `<div class="partner-card-logo"><img src="${esc(PARTNER_CONFIG.logoWhite)}" alt="${esc(PARTNER_CONFIG.curatorName)}"></div>`
    : '';

  document.getElementById('hero-right').innerHTML = `
    <div class="partner-card">
      ${logoHTML}
      <h3 class="partner-name">${esc(PARTNER_CONFIG.curatorName)}</h3>
      <p class="partner-role">${esc(PARTNER_CONFIG.curatorChannel)}</p>
      <a href="${esc(PARTNER_CONFIG.curatorUrl)}" target="_blank" rel="noopener" class="partner-url">${esc(PARTNER_CONFIG.curatorUrl.replace('https://', ''))}</a>
    </div>
  `;
}

function renderCreators() {
  const { creators } = PARTNER_CONFIG;
  document.getElementById('grid-heading').textContent = `${PARTNER_CONFIG.curatorName}'s Picks`;
  document.getElementById('grid-context').textContent = `${creators.length} creators`;

  document.getElementById('creator-grid').innerHTML = creators.map(c => {
    const { icon, name: platformName } = getPlatformInfo(c.platform);
    const blurbHTML = c.blurb ? `<p class="card-blurb">${esc(c.blurb)}</p>` : '';
    const topicHTML = c.topic ? `<span class="pill">${esc(c.topic)}</span>` : '';

    return `
      <div class="creator-card">
        <div class="creator-name">${esc(c.name)}</div>
        <div class="creator-channel">${esc(c.channel)}</div>
        ${blurbHTML}
        <div class="creator-pills">
          ${topicHTML}
          <span class="pill platform">
            <span class="material-symbols-outlined">${icon}</span>${esc(platformName)}
          </span>
        </div>
        <hr class="card-divider">
        <a href="${esc(c.link)}" target="_blank" rel="noopener" class="card-link">Visit &rarr;</a>
      </div>
    `;
  }).join('');
}

function renderAbout() {
  const logoHTML = PARTNER_CONFIG.logoColor
    ? `<div class="about-logo"><img src="${esc(PARTNER_CONFIG.logoColor)}" alt="${esc(PARTNER_CONFIG.curatorName)}"></div>`
    : `<p class="about-text-name">${esc(PARTNER_CONFIG.curatorName)}</p>`;

  const parasHTML = PARTNER_CONFIG.aboutParagraphs
    .map(p => `<p class="about-body">${esc(p)}</p>`)
    .join('');

  document.getElementById('about-inner').innerHTML = `
    ${logoHTML}
    <h2 class="about-headline">${esc(PARTNER_CONFIG.aboutHeadline)}</h2>
    ${parasHTML}
    <a href="${esc(PARTNER_CONFIG.aboutLinkUrl)}" target="_blank" rel="noopener" class="about-link">${esc(PARTNER_CONFIG.aboutLinkText)} &nearr;</a>
  `;
}

document.addEventListener('DOMContentLoaded', () => {
  document.title = PARTNER_CONFIG.pageTitle;
  document.querySelector('meta[name="description"]').setAttribute('content', PARTNER_CONFIG.pageDescription);
  renderHeroLeft();
  renderHeroRight();
  renderCreators();
  renderAbout();
});
</script>
</body>
</html>

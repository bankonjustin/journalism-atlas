<!--
  PARTNER PAGE SHELL — Clone this file, update these 7 values:
  1. PARTNER.name          — e.g. "Chris Cillizza"
  2. PARTNER.channel       — e.g. "The Chris Cillizza Report"
  3. PARTNER.url           — e.g. "https://..."
  4. PARTNER.logoPath      — white/reverse logo for dark hero panel, or null for text treatment
  5. PARTNER.heroBlurb     — 2-sentence partner context for hero narrative
  6. PARTNER.pullQuote     — pull quote for about section (attributed to partner)
  7. CREATORS              — replace JS array with real creator data
                             Each object: { name, channel, link, platform, topic, geo, blurb? }
                             blurb is optional — omit for minimal card, include for blurb mode

  Also update: PARTNER.creatorCount, topicCount, platformCount, geoCount, year,
               PARTNER.aboutParagraphs (array of strings),
               page <title> and <meta name="description">.

  Optional fields:
    PARTNER.shortName      — short name for stat strip "Curated by ___" (default: full name)
    PARTNER.heroTitle      — overrides formula title "N journalists, curated by Name." if set
    PARTNER.geoLabel       — overrides "States / regions covered" in stat strip (e.g. "Countries represented")
    PARTNER.logoPathColor  — color logo for about section card (light background); null = initial treatment
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Partner Page Shell — Independent Journalism Atlas</title>
<meta name="description" content="">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" rel="stylesheet">
<link rel="stylesheet" href="assets/css/variables.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap');

:root {
  --acid: #ceff00;
  --lime: #97d600;
  --olive: #5d7400;
  --white: #ffffff;
  --black: #000000;
  --page-bg: #efeff2;
  --card-bg: #ffffff;
  --border: #d4d4d8;
  --text-primary: #313131;
  --text-secondary: #666666;
  --text-muted: #888888;
  --text-dark-secondary: #a8a8a8;
}

/* === RESET + BASE === */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }
body { font-family: 'Hanken Grotesk', sans-serif; background: var(--page-bg); color: var(--text-primary); line-height: 1.5; overflow-x: hidden; }
a { color: inherit; text-decoration: none; }
img { max-width: 100%; display: block; }

/* === NAV === */
#nav-root {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--white);
  border-bottom: 0.5px solid var(--border);
}
.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 40px;
  height: 56px;
}
.nav-logo img { height: 26px; width: auto; }
.nav-meta {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.04em;
}

/* === HERO === */
.hero {
  display: grid;
  grid-template-columns: 1fr 440px;
  height: 480px;
  background: var(--black);
}
.hero-left {
  padding: 52px 44px 48px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  border-right: 1px solid rgba(255,255,255,0.08);
}
.hero-eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: #666;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 20px;
}
.hero-title {
  font-size: clamp(24px, 2.8vw, 42px);
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -0.02em;
  color: var(--white);
  margin-bottom: 20px;
}
.hero-narrative {
  font-size: 14px;
  color: var(--text-dark-secondary);
  line-height: 1.75;
  max-width: 560px;
}
.hero-cta {
  margin-top: 28px;
  display: inline-flex;
  align-items: center;
  font-size: 13px;
  font-weight: 500;
  color: var(--white);
  border: 1.5px solid rgba(255,255,255,0.45);
  border-radius: 6px;
  padding: 10px 20px;
  transition: background 0.18s, border-color 0.18s, color 0.18s;
  align-self: flex-start;
}
.hero-cta:hover {
  background: var(--white);
  border-color: var(--white);
  color: var(--black);
}
.hero-right {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 48px;
  gap: 14px;
}
.hero-logo img {
  max-width: 280px;
  max-height: 120px;
  width: auto;
  height: auto;
}
.hero-text-treatment { text-align: center; }
.hero-partner-name {
  font-size: clamp(20px, 2.4vw, 34px);
  font-weight: 700;
  color: var(--white);
  letter-spacing: -0.02em;
  line-height: 1.15;
}
.hero-partner-channel {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--text-dark-secondary);
  margin-top: 10px;
  letter-spacing: 0.04em;
}
.hero-partner-link {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  margin-top: 6px;
  display: block;
  letter-spacing: 0.04em;
  transition: color 0.15s;
}
.hero-partner-link:hover { color: rgba(255,255,255,0.65); }

/* === STAT STRIP === */
.stat-strip {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
}
.stat-cell {
  padding: 26px 28px 22px;
  border-right: 1px solid var(--border);
}
.stat-cell:last-child { border-right: none; }
.stat-num {
  font-size: 40px;
  font-weight: 700;
  letter-spacing: -0.05em;
  line-height: 1;
  color: var(--text-primary);
  margin-bottom: 7px;
}
/* lime = partner-curated count + full Atlas total; dark = structural stats (topics, platforms, geographies) */
.stat-num.lime { color: var(--lime); }
.stat-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text-muted);
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  line-height: 1.55;
}

/* === SECTION SHELL === */
.section {
  padding: 52px 40px;
  border-bottom: 1px solid var(--border);
}
.section.on-white { background: var(--card-bg); }
.section.on-gray { background: var(--page-bg); }
.section-header {
  display: flex;
  align-items: baseline;
  gap: 14px;
  margin-bottom: 32px;
}
.section-num {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  flex-shrink: 0;
}
.section-title {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--black);
}

/* === CREATOR GRID === */
.creator-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
  gap: 12px;
}

/* === CREATOR CARD === */
.creator-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 20px 22px;
  display: flex;
  flex-direction: column;
  transition: background 0.16s, border-color 0.16s;
}
.creator-card:hover {
  background: var(--page-bg);
  border-color: #b0b0b8;
}
.card-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--black);
  line-height: 1.3;
}
.card-channel {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-top: 3px;
}
.card-blurb {
  font-size: 13px;
  color: #555;
  line-height: 1.7;
  margin-top: 12px;
}
.card-footer {
  margin-top: auto;
  padding-top: 14px;
  margin-top: 14px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.card-platform-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: color 0.14s;
}
.card-platform-link .material-symbols-outlined {
  font-size: 16px;
  color: var(--text-muted);
  font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 16;
  transition: color 0.14s;
  flex-shrink: 0;
}
.card-platform-link:hover .material-symbols-outlined { color: var(--text-primary); }
.card-platform-name {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0.04em;
  transition: color 0.14s;
}
.card-platform-url {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: #b0b0b8;
  letter-spacing: 0.03em;
  transition: color 0.14s;
}
.card-platform-link:hover .card-platform-name,
.card-platform-link:hover .card-platform-url { color: var(--text-primary); }
.card-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.card-tag {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text-muted);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 3px 10px;
  white-space: nowrap;
}

/* === ABOUT SECTION === */
.about-layout {
  display: grid;
  grid-template-columns: 1fr 360px;
  gap: 56px;
  align-items: start;
}
.about-body p {
  font-size: 16px;
  color: var(--text-secondary);
  line-height: 1.75;
  margin-bottom: 20px;
}
.about-body p:last-child { margin-bottom: 0; }
.pull-quote {
  border-left: 3px solid var(--lime);
  padding: 14px 20px;
  margin-top: 28px;
  font-style: italic;
  font-size: 14px;
  color: #555;
  line-height: 1.75;
  border-radius: 0 3px 3px 0;
}
.pull-quote cite {
  display: block;
  font-style: normal;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.06em;
  margin-top: 10px;
  text-transform: uppercase;
}
.partner-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.partner-card-initial {
  width: 48px;
  height: 48px;
  border-radius: 6px;
  background: var(--black);
  color: var(--white);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.02em;
  flex-shrink: 0;
  margin-bottom: 14px;
}
.partner-card-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--black);
  line-height: 1.3;
}
.partner-card-channel {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 3px;
  letter-spacing: 0.04em;
}
.partner-card-link {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--olive);
  letter-spacing: 0.04em;
  margin-top: 8px;
  display: block;
  transition: color 0.14s;
}
.partner-card-link:hover { color: var(--black); }
.partner-card-attribution {
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.6;
  padding-top: 14px;
  border-top: 1px solid var(--border);
  margin-top: 16px;
}

/* === ATLAS BRIDGE CTA === */
.atlas-bridge {
  background: var(--black);
  padding: 72px 40px;
  text-align: center;
}
.bridge-headline {
  font-size: clamp(20px, 2.8vw, 36px);
  font-weight: 700;
  color: var(--white);
  letter-spacing: -0.02em;
  margin-bottom: 16px;
  line-height: 1.2;
}
.bridge-sub {
  font-size: 16px;
  color: var(--text-dark-secondary);
  max-width: 560px;
  margin: 0 auto 36px;
  line-height: 1.7;
}
.bridge-cta-group {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  flex-wrap: wrap;
}
.btn-acid {
  display: inline-flex;
  align-items: center;
  background: var(--acid);
  color: var(--black);
  font-family: 'Hanken Grotesk', sans-serif;
  font-size: 14px;
  font-weight: 700;
  padding: 12px 24px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
  letter-spacing: -0.01em;
  transition: background 0.16s;
}
.btn-acid:hover { background: #d6f500; }
.btn-ghost-white {
  display: inline-flex;
  align-items: center;
  font-size: 13px;
  font-weight: 500;
  color: rgba(255,255,255,0.6);
  border: 1.5px solid rgba(255,255,255,0.22);
  border-radius: 6px;
  padding: 10px 20px;
  transition: color 0.16s, border-color 0.16s;
}
.btn-ghost-white:hover { color: var(--white); border-color: rgba(255,255,255,0.5); }

/* === FOOTER === */
.site-footer {
  padding: 26px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid var(--border);
  background: var(--page-bg);
}
.footer-left {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-secondary);
  line-height: 2;
}
.footer-left a { color: var(--olive); transition: color 0.14s; }
.footer-left a:hover { color: var(--black); }
.footer-right {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text-muted);
  text-align: right;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  line-height: 2;
}

/* === SCROLLBAR === */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: var(--page-bg); }
::-webkit-scrollbar-thumb { background: var(--border); }

/* === MOBILE === */
@media (max-width: 860px) {
  .about-layout {
    grid-template-columns: 1fr;
    gap: 32px;
  }
}

@media (max-width: 768px) {
  .hero {
    display: flex;
    flex-direction: column;
    height: auto;
  }
  .hero-right {
    padding: 36px 24px 28px;
    min-height: 180px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .hero-left {
    padding: 36px 24px 40px;
    border-right: none;
  }
  .hero-cta { margin-top: 24px; }
  .stat-strip { grid-template-columns: 1fr 1fr; }
  .stat-cell { border-right: none; border-bottom: 1px solid var(--border); }
  .stat-cell:nth-child(odd) { border-right: 1px solid var(--border); }
  .stat-cell:nth-child(5) { grid-column: 1 / -1; border-right: none; border-bottom: none; }
  .creator-grid { grid-template-columns: 1fr; }
  .section { padding: 40px 20px; }
  .nav-inner { padding: 0 20px; }
  .atlas-bridge { padding: 52px 20px; }
  .site-footer { flex-direction: column; gap: 6px; text-align: center; padding: 24px 20px; }
  .footer-right { text-align: center; }
}
</style>
</head>
<body>

<nav id="nav-root"></nav>
<div id="hero-root"></div>
<div id="stat-root"></div>
<div id="creators-root"></div>
<div id="about-root"></div>
<div id="bridge-root"></div>
<footer id="footer-root"></footer>

<script>
/* =========================================================
   PARTNER CONFIG — update these 7 values when cloning
   ========================================================= */
const PARTNER = {
  name:          "Anne Helen Petersen",
  shortName:     "Petersen",           // optional — stat strip "Curated by ___"
  channel:       "Culture Study",
  url:           "https://annehelen.substack.com",
  logoPath:      null,   // white/reverse logo for dark hero panel; null = text treatment
  logoPathColor: null,   // color logo for about section card (light bg); null = initial treatment
  heroTitle:     null,   // optional — overrides formula title if set
  heroBlurb:     "Independent journalists covering politics, culture, class, and rural America — selected by Anne Helen Petersen, whose Culture Study newsletter has become a compass for readers trying to understand the country beyond the coasts.",
  pullQuote:     "These are the writers who helped me understand the world differently — journalists working outside institutional press who are doing some of the most essential reporting happening right now.",
  aboutParagraphs: [
    "Anne Helen Petersen is a culture critic and journalist whose Substack newsletter Culture Study reaches hundreds of thousands of readers each week. Before launching Culture Study, she was a senior culture writer at BuzzFeed News, where she covered the intersection of media, politics, and American life.",
    "The journalists on this list are the ones Petersen returns to when she wants to understand what is actually happening in the country — not just in Washington, but in the places and communities that rarely get sustained coverage from national outlets. The list skews toward reporters covering rural America, class, and the economies that make daily life possible.",
    "This curation is part of an ongoing collaboration between Culture Study and the Independent Journalism Atlas. Atlas tracks independent creator-journalists across platforms; Petersen's list offers a curated entry point into that larger ecosystem, filtered through her particular reading practice."
  ],
  creatorCount:  23,
  topicCount:    8,
  platformCount: 4,
  geoCount:      19,
  atlasTotal:    "1,200+",
  year:          2026,
};

/* =========================================================
   CREATORS — replace with real data when cloning
   Each object: { name, channel, link, platform, topic, geo, blurb? }
   blurb is optional — omit for minimal card mode, include for blurb mode
   ========================================================= */
const CREATORS = [
  /* — 4 creators with blurbs — */
  {
    name:     "Maya Thornton",
    channel:  "The Rural Beat",
    link:     "https://mayathornton.substack.com",
    platform: "Newsletter",
    topic:    "Rural Economics",
    geo:      "Appalachia",
    blurb:    "Thornton covers the economic life of Appalachian communities with a precision that embarrasses most national coverage. Her series on dollar store economics in rural counties is essential reading."
  },
  {
    name:     "Darius Okonkwo",
    channel:  "Class Notes",
    link:     "https://classnotes.substack.com",
    platform: "Newsletter",
    topic:    "Labor",
    geo:      "Midwest",
    blurb:    "The most rigorous labor reporter working outside a union shop. Okonkwo's reporting on warehouse work in the Ohio Valley reads like sociology that actually got out of the library."
  },
  {
    name:     "Priya Sandoval",
    channel:  "The Long Dispatch",
    link:     "https://longdispatch.substack.com",
    platform: "Newsletter",
    topic:    "Immigration",
    geo:      "Southwest",
    blurb:    "Sandoval reports on immigration policy from the ground up — tracking the administrative machinery that separates families, not the rhetorical battle that dominates cable."
  },
  {
    name:     "Eli Marchetti",
    channel:  "Local Currency",
    link:     "https://youtube.com/@localcurrency",
    platform: "YouTube",
    topic:    "Local Economy",
    geo:      "Pacific Northwest",
    blurb:    "Marchetti's video essays on municipal finance and local economic policy are the best thing happening in that format. He makes bond measures comprehensible without making them boring."
  },
  /* — 4 creators without blurbs — */
  {
    name:     "Keelin Walsh",
    channel:  "Flyover Country",
    link:     "https://keelinwalsh.com",
    platform: "Website",
    topic:    "Rural Culture",
    geo:      "Great Plains"
  },
  {
    name:     "Simone Beaumont",
    channel:  "Signal to Noise",
    link:     "https://signaltonoise.beehiiv.com",
    platform: "Newsletter",
    topic:    "Media Criticism",
    geo:      "Northeast"
  },
  {
    name:     "Tom\u00e1s Guerrero",
    channel:  "Ground Truth",
    link:     "https://groundtruth.transistor.fm",
    platform: "Podcast",
    topic:    "Criminal Justice",
    geo:      "Southeast"
  },
  {
    name:     "Jana Kowalski",
    channel:  "The Long View",
    link:     "https://janakowalski.substack.com",
    platform: "Newsletter",
    topic:    "Housing",
    geo:      "Mountain West"
  },
];

/* =========================================================
   UTILITIES
   ========================================================= */
function getHostname(url) {
  try { return new URL(url).hostname.replace('www.', ''); } catch (e) { return url; }
}

function platformIcon(platform) {
  const icons = {
    Newsletter: 'mail',  Substack: 'mail',  Beehiiv: 'mail',  Ghost: 'mail',
    YouTube:    'play_circle',
    Podcast:    'podcasts',
    Website:    'language',
    TikTok:     'smartphone',
    Instagram:  'photo_camera',
    Bluesky:    'public',
    Social:     'public',
  };
  return icons[platform] || 'link';
}

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* =========================================================
   RENDER FUNCTIONS
   ========================================================= */
function renderNav() {
  document.getElementById('nav-root').innerHTML = `
    <div class="nav-inner">
      <a href="https://journalismatlas.com" class="nav-logo">
        <img src="assets/images/logos/Journalism_Atlas_wordmark_lockup_black.png"
             alt="Independent Journalism Atlas">
      </a>
      <span class="nav-meta">${esc(PARTNER.name)} &middot; ${PARTNER.creatorCount} creators &middot; journalismatlas.com</span>
    </div>
  `;
}

function renderHero() {
  const rightPanel = PARTNER.logoPath
    ? `<div class="hero-logo">
         <img src="${esc(PARTNER.logoPath)}" alt="${esc(PARTNER.name)}">
       </div>`
    : `<div class="hero-text-treatment">
         <div class="hero-partner-name">${esc(PARTNER.name)}</div>
         <div class="hero-partner-channel">${esc(PARTNER.channel)}</div>
         <a href="${esc(PARTNER.url)}" target="_blank" rel="noopener" class="hero-partner-link">${esc(PARTNER.url.replace('https://', ''))}</a>
       </div>`;

  document.getElementById('hero-root').innerHTML = `
    <div class="hero">
      <div class="hero-left">
        <div>
          <div class="hero-eyebrow">Independent Journalism Atlas &middot; Partner Curated</div>
          <h1 class="hero-title">${PARTNER.heroTitle ? esc(PARTNER.heroTitle) : `${PARTNER.creatorCount} independent journalists,<br>curated by ${esc(PARTNER.name)}.`}</h1>
          <p class="hero-narrative">${esc(PARTNER.heroBlurb)}</p>
        </div>
        <a href="https://journalismatlas.com" class="hero-cta">Explore the full Atlas &rarr;</a>
      </div>
      <div class="hero-right">
        ${rightPanel}
      </div>
    </div>
  `;
}

function renderStatStrip() {
  document.getElementById('stat-root').innerHTML = `
    <div class="stat-strip">
      <div class="stat-cell">
        <div class="stat-num lime">${PARTNER.creatorCount}</div>
        <div class="stat-label">Curated by ${esc(PARTNER.shortName || PARTNER.name)}</div>
      </div>
      <div class="stat-cell">
        <div class="stat-num">${PARTNER.topicCount}</div>
        <div class="stat-label">Beats covered</div>
      </div>
      <div class="stat-cell">
        <div class="stat-num">${PARTNER.platformCount}</div>
        <div class="stat-label">Primary platforms</div>
      </div>
      <div class="stat-cell">
        <div class="stat-num">${PARTNER.geoCount}</div>
        <div class="stat-label">${esc(PARTNER.geoLabel || 'States / regions covered')}</div>
      </div>
      <div class="stat-cell">
        <div class="stat-num lime">${esc(PARTNER.atlasTotal)}</div>
        <div class="stat-label">Creators in full Atlas</div>
      </div>
    </div>
  `;
}

function creatorCardHTML(c) {
  const blurbHTML = c.blurb
    ? `<p class="card-blurb">${esc(c.blurb)}</p>`
    : '';

  return `
    <article class="creator-card">
      <div class="card-name">${esc(c.name)}</div>
      <div class="card-channel">${esc(c.channel)}</div>
      ${blurbHTML}
      <div class="card-footer">
        <a class="card-platform-link" href="${esc(c.link)}" target="_blank" rel="noopener">
          <span class="material-symbols-outlined">${platformIcon(c.platform)}</span>
          <span class="card-platform-name">${esc(c.platform)}</span>
          <span class="card-platform-url">${esc(getHostname(c.link))}</span>
        </a>
        <div class="card-tags">
          <span class="card-tag">${esc(c.topic)}</span>
          <span class="card-tag">${esc(c.geo)}</span>
        </div>
      </div>
    </article>
  `;
}

function renderCreatorSection() {
  const hasBlurbs = CREATORS.some(c => c.blurb);
  const cards = CREATORS.map(creatorCardHTML).join('');
  document.getElementById('creators-root').innerHTML = `
    <div class="section on-white" data-has-blurbs="${hasBlurbs}">
      <div class="section-header">
        <span class="section-num">01</span>
        <h2 class="section-title">${esc(PARTNER.name)}&rsquo;s List</h2>
      </div>
      <div class="creator-grid">${cards}</div>
    </div>
  `;
}

function renderAboutSection() {
  const initial = PARTNER.name.charAt(0).toUpperCase();
  const logoContent = PARTNER.logoPathColor
    ? `<img src="${esc(PARTNER.logoPathColor)}" alt="${esc(PARTNER.name)}" style="max-height: 40px; width: auto; margin-bottom: 14px;">`
    : `<div class="partner-card-initial">${initial}</div>`;

  const paragraphs = PARTNER.aboutParagraphs
    .map(p => `<p>${esc(p)}</p>`)
    .join('');

  document.getElementById('about-root').innerHTML = `
    <div class="section on-gray">
      <div class="section-header">
        <span class="section-num">02</span>
        <h2 class="section-title">About ${esc(PARTNER.name)}</h2>
      </div>
      <div class="about-layout">
        <div class="about-body">
          ${paragraphs}
          <blockquote class="pull-quote">
            &ldquo;${esc(PARTNER.pullQuote)}&rdquo;
            <cite>&mdash; ${esc(PARTNER.name)}</cite>
          </blockquote>
        </div>
        <div>
          <div class="partner-card">
            ${logoContent}
            <div class="partner-card-name">${esc(PARTNER.name)}</div>
            <div class="partner-card-channel">${esc(PARTNER.channel)}</div>
            <a href="${esc(PARTNER.url)}" target="_blank" rel="noopener" class="partner-card-link">${esc(PARTNER.url.replace('https://', ''))}</a>
            <div class="partner-card-attribution">Curated in partnership with the Independent Journalism Atlas.</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderAtlasBridge() {
  document.getElementById('bridge-root').innerHTML = `
    <div class="atlas-bridge">
      <h2 class="bridge-headline">These ${PARTNER.creatorCount} journalists are part of a larger ecosystem.</h2>
      <p class="bridge-sub">The Independent Journalism Atlas tracks ${esc(PARTNER.atlasTotal)} verified creator-journalists across newsletters, video, podcasts, and social.</p>
      <div class="bridge-cta-group">
        <a href="https://journalismatlas.com" class="btn-acid">Explore the full Atlas &rarr;</a>
        <a href="/postcard" class="btn-ghost-white">Build your own Starter Pack &rarr;</a>
      </div>
    </div>
  `;
}

function renderFooter() {
  document.getElementById('footer-root').innerHTML = `
    <div class="site-footer">
      <div class="footer-left">
        <a href="https://journalismatlas.com">journalismatlas.com</a>
      </div>
      <div class="footer-right">
        ${esc(PARTNER.name)} &middot; ${PARTNER.creatorCount} creators &middot; ${PARTNER.year}
      </div>
    </div>
  `;
}

/* =========================================================
   INIT
   ========================================================= */
document.addEventListener('DOMContentLoaded', () => {
  document.title = `${PARTNER.name}'s List \u2014 Independent Journalism Atlas`;
  renderNav();
  renderHero();
  renderStatStrip();
  renderCreatorSection();
  renderAboutSection();
  renderAtlasBridge();
  renderFooter();
});
</script>
</body>
</html>

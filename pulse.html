  "Social Issues":                 { onDark: "#ff33cc", onLight: "#a1006c" },
  "Science, Health & Environment": { onDark: "#00e5ff", onLight: "#005ea3" },
  "General News":                  { onDark: "#fff700", onLight: "#806600" },
  "Culture & Media":               { onDark: "#ff66ff", onLight: "#a100a1" },
  "Civic Life":                    { onDark: "#66ffcc", onLight: "#006644" },
  "Journalism Formats":            { onDark: "#ff9966", onLight: "#9b3000" },
  "Lifestyle & Personal Life":     { onDark: "#aabbff", onLight: "#3344aa" },
};

function groupColor(group, surface) {
  const primary = group.split(',')[0].trim();
  const c = GROUP_COLORS[primary] || { onDark: "#ceff00", onLight: "#5d7400" };
  return c[surface];
}

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ── Render: header ────────────────────────────────────────────────────────────
function renderHeader(meta) {
  document.getElementById('header-dateline').textContent =
    `Week of ${formatDate(meta.generated_at)} · ${meta.days_window}-day window`;
  document.getElementById('header-stats').textContent =
    `${meta.feeds_fetched} feeds · ${meta.posts_retrieved.toLocaleString()} posts · ${meta.clusters_found} clusters`;
}

// ── Render: featured strip ────────────────────────────────────────────────────
function renderFeaturedStrip(featuredClusters) {
  const html = featuredClusters.map(c => {
    const color = groupColor(c.group, 'onLight');
    const stories = c.stories.slice(0, 2).map(s => `
      <div class="fi-story">
        <div class="fi-story-creator">${escHtml(s.creator_name)} · ${escHtml(s.channel)}</div>
        <span class="fi-story-title">${escHtml(s.title)}</span>
      </div>
    `).join('');

    return `
      <div class="featured-item">
        <div class="fi-accent" style="background:${color}"></div>
        <span class="fi-label" style="color:${color}">${escHtml(c.topic_label)}</span>
        <h2 class="fi-headline">${escHtml(c.headline)}</h2>
        <p class="fi-synthesis">${escHtml(c.synthesis)}</p>
        <div class="fi-creator-count">${c.creator_count} creators</div>
        <div class="fi-divider"></div>
        <div class="fi-stories">${stories}</div>
      </div>
    `;
  }).join('');

  document.getElementById('featured-strip').innerHTML = html;
}

// ── Render: cluster card ──────────────────────────────────────────────────────
function renderClusterCard(c, isFeatured) {
  const color = groupColor(c.group, 'onLight');
  const isHeavy = c.topic_label === 'ICE DETENTION DEATHS';

  const classes = ['cluster-card'];
  if (isFeatured) classes.push('is-featured');
  if (isHeavy) classes.push('heavy-story');

  const leadBadge = isFeatured
    ? `<span class="lead-badge" style="color:${color};border-color:${color}">LEAD</span>`
    : '';

  const stories = c.stories.slice(0, 3).map(s => `
    <div class="cs-story">
      <a href="${s.url}" class="cs-story-title" target="_blank" rel="noopener">${escHtml(s.title)}</a>
      <div class="cs-story-by">${escHtml(s.creator_name)} · ${escHtml(s.channel)}</div>
    </div>
  `).join('');

  const primaryGroup = c.group.split(',')[0].trim();

  return `
    <div class="${classes.join(' ')}">
      <div class="card-accent" style="background:${color}"></div>
      <div class="card-body">
        <div class="card-top-row">
          <span class="card-topic-label" style="color:${color}">${escHtml(c.topic_label)}</span>
          ${leadBadge}
        </div>
        <h3 class="card-headline">${escHtml(c.headline)}</h3>
        <div class="card-stories">${stories}</div>
        <div class="card-bottom">
          <span class="card-group-tag">${escHtml(primaryGroup)}</span>
          <span class="card-creator-count">${c.creator_count} creators</span>
        </div>
      </div>
    </div>
  `;
}

// ── Render: all 9 clusters in one grid ───────────────────────────────────────
function renderAllClusters(data) {
  const featuredLabels = new Set(data.featured_clusters.map(c => c.topic_label));
  const all = [
    ...data.featured_clusters.map(c => ({ ...c, isFeatured: true })),
    ...data.clusters.map(c => ({ ...c, isFeatured: false })),
  ].sort((a, b) => b.creator_count - a.creator_count);

  document.getElementById('clusters-grid').innerHTML =
    all.map(c => renderClusterCard(c, c.isFeatured)).join('');
}

// ── Render: corpus zone ───────────────────────────────────────────────────────
function renderCorpus(corpusData) {
  const totalCreators = Object.values(corpusData).reduce((sum, arr) => sum + arr.length, 0);

  const groupsHtml = Object.entries(corpusData).map(([group, creators]) => {
    const color = groupColor(group, 'onLight');
    const primaryGroup = group.split(',')[0].trim();
    const names = creators
      .map(c => `<span class="corpus-name">${escHtml(c.name)}</span>`)
      .join('<span class="corpus-sep"> · </span>');

    return `
      <div class="corpus-group">
        <div class="corpus-group-label" style="color:${color}">
          ${escHtml(primaryGroup.toUpperCase())}
          <span class="corpus-count">${creators.length}</span>
        </div>
        <div class="corpus-names">${names}</div>
      </div>
    `;
  }).join('');

  document.getElementById('corpus-section').innerHTML = `
    <div class="corpus-header-row">
      <span class="corpus-title">${totalCreators} journalists active this week</span>
      <span class="corpus-subtitle">Pulse corpus · April 15–22, 2026</span>
    </div>
    <div class="corpus-groups">${groupsHtml}</div>
  `;
}

// ── Render: run bar ───────────────────────────────────────────────────────────
function renderRunBar(meta, unclustered) {
  const d = new Date(meta.generated_at);
  const ts = d.toLocaleString('en-US', {
    month: 'short', day: 'numeric', year: 'numeric',
    hour: 'numeric', minute: '2-digit', hour12: true,
  });
  document.getElementById('run-bar').innerHTML = `
    <div class="run-bar-text">
      Generated <strong>${ts}</strong> ·
      <strong>${meta.feeds_fetched}</strong> feeds ·
      <strong>${meta.posts_retrieved.toLocaleString()}</strong> posts ·
      <strong>${unclustered}</strong> unclustered
    </div>
    <div class="run-bar-note">atlas-pulse/pulse_fetch.py</div>
  `;
}

// ── Main ──────────────────────────────────────────────────────────────────────
function renderPulse(data) {
  renderHeader(data.run_metadata);
  renderFeaturedStrip(data.featured_clusters);
  renderAllClusters(data);
  renderCorpus(CORPUS_DATA);
  renderRunBar(data.run_metadata, data.unclustered_count);
}

renderPulse(PULSE_DATA);

</script>
</body>
</html>

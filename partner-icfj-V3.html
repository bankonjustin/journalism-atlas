      link: 'https://www.instagram.com/farahelkordy_',
      platform: 'Social - Instagram', topic: 'Technology', geography: 'Egypt', region: 'MENA',
      blurb: 'UAE Media Licensed and Forbes Middle East-recognized journalist covering tech, business, and global news in accessible Arabic-language explainers for an audience of 5M+, clearly positioned as an independent news creator at scale.',
    },
  ],
};

/* =========================================================
   UTILITIES
   ========================================================= */
function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function getPlatformInfo(platform) {
  const map = {
    'Newsletter - Substack': { icon: 'mail',        name: 'Substack'   },
    'Newsletter - Beehiiv':  { icon: 'mail',        name: 'Beehiiv'    },
    'Newsletter - Ghost':    { icon: 'mail',        name: 'Ghost'      },
    'Newsletter - Other':    { icon: 'mail',        name: 'Newsletter' },
    'Video - YouTube':       { icon: 'play_circle', name: 'YouTube'    },
    'Video - Instagram':     { icon: 'play_circle', name: 'Instagram'  },
    'Video - TikTok':        { icon: 'play_circle', name: 'TikTok'     },
    'Podcast':               { icon: 'podcasts',    name: 'Podcast'    },
    'Website':               { icon: 'language',    name: 'Website'    },
  };
  if (map[platform]) return map[platform];
  if (platform && platform.startsWith('Social')) {
    return { icon: 'alternate_email', name: platform.replace('Social - ', '') };
  }
  return { icon: 'language', name: platform || '' };
}

/* =========================================================
   RENDER
   ========================================================= */
function renderHeroLeft() {
  const statsHTML = PARTNER_CONFIG.stats.map(s => `
    <div class="hero-stat">
      <div class="hero-stat-num">${esc(s.num)}</div>
      <div class="hero-stat-label">${esc(s.label)}</div>
    </div>
  `).join('');

  document.getElementById('hero-left').innerHTML = `
    <p class="hero-eyebrow">A Curated List from ${esc(PARTNER_CONFIG.curatorName)}</p>
    <h1 class="hero-h1">${esc(PARTNER_CONFIG.pageTitle.replace(' \u2014 Independent Journalism Atlas', ''))}</h1>
    <p class="hero-body">${esc(PARTNER_CONFIG.curatorNote)}</p>
    <div class="hero-stats">${statsHTML}</div>
    <p class="hero-collab">Curated by ${esc(PARTNER_CONFIG.curatorName)} &times; Independent Journalism Atlas</p>
  `;
}

function renderHeroRight() {
  const logoHTML = PARTNER_CONFIG.logoWhite
    ? `<div class="partner-card-logo"><img src="${esc(PARTNER_CONFIG.logoWhite)}" alt="${esc(PARTNER_CONFIG.curatorName)}"></div>`
    : '';

  document.getElementById('hero-right').innerHTML = `
    <div class="partner-card">
      ${logoHTML}
      <h3 class="partner-name">${esc(PARTNER_CONFIG.curatorName)}</h3>
      <p class="partner-role">${esc(PARTNER_CONFIG.curatorChannel)}</p>
      <a href="${esc(PARTNER_CONFIG.curatorUrl)}" target="_blank" rel="noopener" class="partner-url">${esc(PARTNER_CONFIG.curatorUrl.replace('https://', ''))}</a>
    </div>
  `;
}

function renderRegionNav() {
  const nav = document.getElementById('region-nav');
  if (!PARTNER_CONFIG.hasGroups) {
    nav.style.display = 'none';
    return;
  }
  nav.innerHTML = `
    <div class="region-nav-inner">
      ${PARTNER_CONFIG.groups.map((g, i) => `
        <a class="region-nav-link${i === 0 ? ' active' : ''}" href="#region-${esc(g.id)}">${esc(g.label)}</a>
      `).join('')}
    </div>
  `;
}

function creatorCardHTML(c, rank) {
  const { icon, name: platformName } = getPlatformInfo(c.platform);
  const rankHTML  = rank != null ? `<span class="card-rank">${String(rank).padStart(2, '0')}</span>` : '';
  const blurbHTML = c.blurb    ? `<p class="card-blurb">${esc(c.blurb)}</p>`         : '';
  const geoHTML   = c.geography ? `<span class="pill">${esc(c.geography)}</span>`     : '';
  const topicHTML = c.topic     ? `<span class="pill">${esc(c.topic)}</span>`         : '';

  return `
    <div class="creator-card">
      ${rankHTML}
      <div class="creator-name">${esc(c.name)}</div>
      <div class="creator-channel">${esc(c.channel)}</div>
      ${blurbHTML}
      <div class="creator-pills">
        ${geoHTML}
        ${topicHTML}
        <span class="pill platform">
          <span class="material-symbols-outlined">${icon}</span>${esc(platformName)}
        </span>
      </div>
      <hr class="card-divider">
      <a href="${esc(c.link)}" target="_blank" rel="noopener" class="card-link">Visit &rarr;</a>
    </div>
  `;
}

function renderCreators() {
  const { creators, groups, hasGroups } = PARTNER_CONFIG;
  document.getElementById('grid-heading').textContent = `${PARTNER_CONFIG.curatorName}\u2019s Picks`;
  document.getElementById('grid-context').textContent = `${creators.length} creators`;

  if (!hasGroups) {
    document.getElementById('creator-grid').innerHTML = creators.map(c => creatorCardHTML(c, null)).join('');
    return;
  }

  document.getElementById('creator-grid').innerHTML = groups.map((group, gi) => {
    const groupCreators = creators.filter(c => c.region === group.key);
    const divider = gi > 0 ? '<hr class="region-divider">' : '';
    return `
      ${divider}
      <div class="creator-section" id="region-${esc(group.id)}" data-region="${esc(group.id)}">
        <div class="region-header">
          <span class="region-label">${esc(group.label)}</span>
          <span class="creator-count-pill">${groupCreators.length} journalists</span>
        </div>
        <div class="creator-grid two-col">
          ${groupCreators.map((c, idx) => creatorCardHTML(c, idx + 1)).join('')}
        </div>
      </div>
    `;
  }).join('');

  setupRegionNav();
}

function setupRegionNav() {
  const navLinks = document.querySelectorAll('.region-nav-link');
  if (!navLinks.length) return;

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        navLinks.forEach(l => l.classList.remove('active'));
        const link = document.querySelector(`.region-nav-link[href="#region-${entry.target.dataset.region}"]`);
        if (link) link.classList.add('active');
      }
    });
  }, { rootMargin: '0px 0px -70% 0px', threshold: 0 });

  document.querySelectorAll('.creator-section').forEach(s => observer.observe(s));
}

function renderAbout() {
  const logoHTML = PARTNER_CONFIG.logoColor
    ? `<div class="about-logo"><img src="${esc(PARTNER_CONFIG.logoColor)}" alt="${esc(PARTNER_CONFIG.curatorName)}"></div>`
    : `<p class="about-text-name">${esc(PARTNER_CONFIG.curatorName)}</p>`;

  const parasHTML = PARTNER_CONFIG.aboutParagraphs
    .map(p => `<p class="about-body">${esc(p)}</p>`)
    .join('');

  document.getElementById('about-inner').innerHTML = `
    ${logoHTML}
    <h2 class="about-headline">${esc(PARTNER_CONFIG.aboutHeadline)}</h2>
    ${parasHTML}
    <a href="${esc(PARTNER_CONFIG.aboutLinkUrl)}" target="_blank" rel="noopener" class="about-link">${esc(PARTNER_CONFIG.aboutLinkText)} &nearr;</a>
  `;
}

document.addEventListener('DOMContentLoaded', () => {
  document.title = PARTNER_CONFIG.pageTitle;
  document.querySelector('meta[name="description"]').setAttribute('content', PARTNER_CONFIG.pageDescription);

  renderHeroLeft();
  renderHeroRight();
  renderRegionNav();
  renderCreators();
  renderAbout();
});
</script>
</body>
</html>
